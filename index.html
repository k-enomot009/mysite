<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Poc2production</title>
    <link rel="stylesheet" href="style.css">

	<style>
	.base {
		overflow: hidden;
	    display: flex;
    	flex-direction: column;
    	height: 100vh;
	}

	.class1 {
		flex-shrink: 0;
		line-height: 0;
		display:
		block font-size: 0
	}

	.class1 iframe {
    	display: block;
    	width: 100%;
    	height: 80px;
    	border: none;
	}

	.class2 {
		flex: 1;
	}

	.class2 iframe {
	    display: block;
    	width: 100%;
    	height: 100%;
    	border: none;
	}

	</style>
</head>

<body>
    <div class="base">
        <div class="class1">
            <iframe src="menu.html"></iframe>
        </div>
        <div class="class2">
            <iframe src="main.html" name="main_frame"></iframe>
        </div>
    </div>
</body>
</html>
